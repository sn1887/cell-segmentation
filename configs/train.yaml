seed: 42

paths:
  data_dir: data/tum-ai-e-lab-cell-segmentation/Archive
  output_dir: outputs
  submission_path: ${paths.output_dir}/submission.csv

data:
  image_size: 256
  batch_size: 12
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  val_fraction: 0.15
  stratify_bins: 8
  id_width: 5
  train_images: train/images
  train_masks: train/masks
  train_metadata: train/train_metadata.csv
  test_images:
    - test/images
    - train/images
  sample_submission: test/sample_submission.csv
  compute_dist_map: true

augmentations:
  train: cell
  val: basic
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

model:
  arch: FPN
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 3
  classes: 2

loss:
  ce_weight: 1.0
  boundary_weight: 0.01
  boundary_idc: [1]
  normalize_dist: true
  class_weights: auto

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.00001

scheduler:
  name: cosine
  min_lr: 0.000001

trainer:
  max_epochs: 30
  accelerator: auto
  devices: auto
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  deterministic: false
  early_stopping_patience: 8

predict:
  ckpt_path: null
  threshold: 0.5
  tta: false

hydra:
  run:
    dir: ${paths.output_dir}/hydra/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true

